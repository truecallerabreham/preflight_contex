<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <style>
    .bg { fill: #0f172a; }
    .panel { fill: #111827; stroke: #374151; stroke-width: 2; rx: 16; }
    .text { fill: #e5e7eb; font-family: Inter, sans-serif; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; }
    .arrow { fill: none; stroke: #60a5fa; stroke-width: 3; marker-end: url(#arrow); }
    .box { fill: #1f2937; stroke: #4b5563; stroke-width: 1.5; rx: 14; }
    .box-title { font-size: 13px; font-weight: 700; fill: #93c5fd; }
    .box-text { font-size: 12px; fill: #d1d5db; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
  </defs>
  <rect class="bg" width="960" height="540" rx="24" />
  <text x="50" y="50" class="title">Context Visualizer Architecture</text>
  <g transform="translate(60,100)">
    <rect class="box" width="220" height="120" />
    <text x="16" y="30" class="box-title">AI Agent</text>
    <text x="16" y="54" class="box-text">Claude Code / OpenAI-compatible agent</text>
    <text x="16" y="72" class="box-text">POST /v1/messages</text>
  </g>
  <g transform="translate(360,100)">
    <rect class="box" width="240" height="160" />
    <text x="16" y="30" class="box-title">Local Proxy</text>
    <text x="16" y="54" class="box-text">Express server on port 3131</text>
    <text x="16" y="72" class="box-text">Intercept final calls</text>
    <text x="16" y="90" class="box-text">Hold request, emit SSE</text>
    <text x="16" y="108" class="box-text">Forward edited payload</text>
  </g>
  <g transform="translate(700,100)">
    <rect class="box" width="200" height="120" />
    <text x="16" y="30" class="box-title">LLM API</text>
    <text x="16" y="54" class="box-text">Anthropic / OpenAI</text>
    <text x="16" y="72" class="box-text">Stream responses back</text>
  </g>
  <path class="arrow" d="M 280 160 C 320 160 340 160 360 160" />
  <path class="arrow" d="M 600 160 C 640 160 660 160 700 160" />
  <path class="arrow" d="M 620 190 C 620 260 620 320 620 380" />
  <path class="arrow" d="M 520 460 C 520 420 440 420 400 420" />
  <g transform="translate(220,320)">
    <rect class="box" width="520" height="160" />
    <text x="16" y="30" class="box-title">Browser UI</text>
    <text x="16" y="54" class="box-text">Panel A: Context blocks</text>
    <text x="16" y="72" class="box-text">Panel B: Editable block content</text>
    <text x="16" y="90" class="box-text">Panel C: Actions & AI suggestions</text>
  </g>
  <path class="arrow" d="M 460 200 L 460 320" />
</svg>
